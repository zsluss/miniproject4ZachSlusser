<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Weather App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">Weather Lookup</a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                {% if request.user.is_authenticated %}
                    <span class="text-white-50 small">{{ request.user.username }}</span>
                    <a class="btn btn-outline-light btn-sm" href="{% url 'my_searches' %}">My Searches</a>
                    <form method="post" action="{% url 'logout' %}" class="m-0">
                        {% csrf_token %}
                        <button class="btn btn-light btn-sm" type="submit">Log Out</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const controls = document.querySelectorAll(
                "input:not([type='hidden']):not([type='checkbox']):not([type='radio']):not([type='submit']), select, textarea"
            );
            controls.forEach((el) => el.classList.add("form-control"));

            const checks = document.querySelectorAll("input[type='checkbox'], input[type='radio']");
            checks.forEach((el) => el.classList.add("form-check-input"));
        });
    </script>
</body>
</html>
